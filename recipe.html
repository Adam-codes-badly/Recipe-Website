<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favourite Recipes</title>
    <meta name="description" content="Recipe page" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero recipe-hero">
        <p class="eyebrow">Favourite Recipes</p>
        <nav class="crumbs" aria-label="Breadcrumb">
          <a href="./index.html">Home</a>
          <span>/</span>
          <span id="crumb-current">Recipe</span>
        </nav>
        <h1 id="site-title">Recipe</h1>
        <p id="site-copy" class="hero-copy"></p>
      </header>

      <section class="recipe-photo-shell">
        <figure class="recipe-photo-card">
          <img id="recipe-photo" class="recipe-photo" alt="" />
          <figcaption id="recipe-photo-credit" class="recipe-photo-credit"></figcaption>
        </figure>
      </section>

      <main class="recipe-layout">
        <aside class="recipe-card controls-card" aria-labelledby="scale-title">
          <div class="card-heading">
            <p class="card-kicker">Recipe Scale</p>
            <h2 id="scale-title">Adjust the batch</h2>
          </div>

          <div class="scale-display">
            <span id="scale-value">1x</span>
            <span id="yield-value"></span>
          </div>

          <label class="slider-label" for="scale-slider">
            Move the slider to make a smaller or larger batch.
          </label>
          <input
            id="scale-slider"
            type="range"
            min="0.5"
            max="3"
            step="0.25"
            value="1"
          />

          <div class="slider-ticks" aria-hidden="true">
            <span>0.5x</span>
            <span>1x</span>
            <span>2x</span>
            <span>3x</span>
          </div>

          <p class="control-note">
            Countable ingredients are rounded to sensible whole values so the
            instructions still read like a real recipe.
          </p>
        </aside>

        <article class="recipe-card recipe-content">
          <section class="section-block" aria-labelledby="ingredients-title">
            <div class="card-heading">
              <p class="card-kicker">Ingredients</p>
              <h2 id="ingredients-title"><span id="ingredients-heading"></span></h2>
            </div>
            <ul id="ingredients-list" class="ingredients-list"></ul>
          </section>

          <section class="section-block" aria-labelledby="method-title">
            <div class="card-heading">
              <p class="card-kicker">Method</p>
              <h2 id="method-title"><span id="method-heading"></span></h2>
            </div>
            <ol id="method-list" class="method-list"></ol>
          </section>

          <section class="section-block notes-block" aria-labelledby="notes-title">
            <div class="card-heading">
              <p class="card-kicker">Notes</p>
              <h2 id="notes-title"><span id="notes-heading"></span></h2>
            </div>
            <ul id="notes-list" class="notes-list"></ul>
          </section>
        </article>
      </main>
    </div>

    <script type="module" src="./recipe-page.js"></script>
  </body>
</html>
