<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favourite Recipes</title>
    <meta
      name="description"
      content="Browse and search a growing collection of favourite recipes with dedicated recipe pages and live scaling."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero home-hero">
        <p class="eyebrow">Favourite Recipes</p>
        <h1>Find the recipe you want to cook next.</h1>
        <p class="hero-copy">
          A small static recipe collection built for GitHub Pages. Every recipe
          has live scaling and quantities embedded directly into the method.
        </p>
      </header>

      <main class="home-layout">
        <section class="recipe-card search-card" aria-labelledby="search-title">
          <div class="card-heading">
            <p class="card-kicker">Search</p>
            <h2 id="search-title">Browse recipes</h2>
          </div>
          <label class="search-label" for="recipe-search">
            Search by title, flavour, or category.
          </label>
          <input
            id="recipe-search"
            class="search-input"
            type="search"
            placeholder="Try pastry, lemon, tart, cake..."
            autocomplete="off"
          />
          <div class="filter-block">
            <p class="filter-label">Filter by tag</p>
            <div id="filter-bar" class="filter-bar" aria-label="Recipe filters"></div>
          </div>
          <p id="search-summary" class="search-summary">Showing 2 recipes</p>
        </section>

        <section aria-labelledby="recipe-list-title">
          <div class="card-heading list-heading">
            <p class="card-kicker">Collection</p>
            <h2 id="recipe-list-title">Recipe index</h2>
          </div>
          <div id="recipe-grid" class="recipe-grid"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./home.js"></script>
  </body>
</html>
